services:
  - type: web
    name: elecciones-cea-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elecciones-cea-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: elecciones-cea-frontend
    env: static
    buildCommand: ''
    staticPublishPath: ./frontend
    
databases:
  - name: elecciones-cea-db
    databaseName: elecciones_db
    user: elecciones_user
