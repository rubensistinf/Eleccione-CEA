<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Candidatos - Elecciones Estudiantiles</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="main-header">
    <div class="header-content">
      <div class="header-left">
        <img src="imagenes/logo.jpg" alt="Logo" class="header-logo">
        <h1>Plataforma de Elecciones Estudiantiles</h1>
      </div>
      <nav>
        <a href="index.html">Inicio</a>
        <a href="registrar-estudiantes.html">Registrar Estudiantes</a>
        <a href="registro-candidatos.html">Registro de Candidatos</a>
        <a href="votacion.html">Votación</a>
        <a href="resultados.html">Resultados</a>
      </nav>
    </div>
  </header>
  <main>
    <section id="registro-candidato">
      <h2>Registro de Candidatos</h2>
      <form id="form-candidato">
        <input type="text" id="nombre-candidato" placeholder="Nombre completo" required>
        <input type="text" id="siglas-candidato" placeholder="Siglas del partido" required>
        <input type="file" id="foto-candidato" accept="image/*" required>
        <button type="submit">Registrar Candidato</button>
      </form>
      <div id="lista-candidatos"></div>
    </section>
  </main>
  <script>
  // Protección de acceso
  (function() {
    const acceso = sessionStorage.getItem('accesoAdmin');
    if (acceso !== 'ok') {
      window.location.href = 'index.html';
    }
  })();
  </script>
  <script src="js/registro-candidatos.js"></script>
</body>
</html>
