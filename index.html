<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elecciones Estudiantiles - Inicio</title>
  
  <!-- Open Graph Meta Tags (Para compartir en WhatsApp/Facebook/Redes) -->
  <meta property="og:title" content="Elecciones Estudiantiles CEA">
  <meta property="og:description" content="Plataforma oficial de elecciones estudiantiles del CEA Prof. Herman Ortiz Camargo.">
  <meta property="og:image" content="https://eleccione-cea.onrender.com/images/compartir.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://eleccione-cea.onrender.com/">
  <meta property="og:type" content="website">

  <link rel="stylesheet" href="css/styles.css">
  <style>
    .login-container { max-width: 400px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .login-container h2 { text-align: center; color: #333; margin-bottom: 20px; }
    .login-container input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
    .login-container button { width: 100%; padding: 10px; background: #0056b3; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    .login-container button:hover { background: #004494; }
    #mensaje-login { color: red; text-align: center; margin-top: 10px; }
  </style>

<!-- Link para instalar a pantalla -->
<link rel="manifest" href="/instalar/manifest.json">

</head>
<body>
  <header class="main-header">
    <div class="header-content">
      <div class="header-left">
        <img src="imagenes/logo.jpg" alt="Logo" class="header-logo" onerror="this.src='https://via.placeholder.com/50'">
        <h1>Plataforma de Elecciones Estudiantiles</h1>
      </div>
    </div>
  </header>
  <main>
    <section class="presentacion-centro" style="text-align: center; margin-top: 20px;">
      <div class="titulo-centro">
        <h2>CENTRO DE EDUCACIÓN ALTERNATIVA</h2>
        <h3>"Prof. Herman Ortiz Camargo"</h3>
      </div>
    </section>

    <section class="login-section">
      <div class="login-container">
        <h2>Iniciar Sesión</h2>
        <form id="form-login">
          <input type="text" id="usuario" placeholder="Correo o Código CI" required>
          <input type="password" id="contrasena" placeholder="Contraseña" required>
          <button type="submit">Ingresar</button>
        </form>
        <div id="mensaje-login"></div>
      </div>
    </section>
  </main>
  
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>


<!-- script para instalar a pantalla -->
<script src="/instalar/pwa.js"></script>
</body>
</html>
