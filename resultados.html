<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados - Elecciones Estudiantiles</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="main-header">
    <div class="header-content">
      <div class="header-left">
        <img src="imagenes/logo.jpg" alt="Logo" class="header-logo">
        <h1>Plataforma de Elecciones Estudiantiles</h1>
      </div>
      <nav>
        <a href="index.html">Inicio</a>
        <a href="registrar-estudiantes.html">Registrar Estudiantes</a>
        <a href="registro-candidatos.html">Registro de Candidatos</a>
        <a href="votacion.html">Votación</a>
        <a href="resultados.html">Resultados</a>
      </nav>
    </div>
  </header>
  <main>
    <section>
      <h2>Resultados de la Votación</h2>
      <div class="resultados-dashboard">
        <div id="resultados-container">
          <!-- El contenido se cargará dinámicamente -->
        </div>
      </div>
      <div style="width:200px; height:150px; margin: 0 auto;">
        <canvas id="grafico-barras" width="200" height="150"></canvas>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const candidatos = JSON.parse(localStorage.getItem('candidatos')) || [];
      const votantes = JSON.parse(localStorage.getItem('votantes')) || [];
      const votos = JSON.parse(localStorage.getItem('votos')) || [];

      function actualizarResultados() {
        if (typeof mostrarResultados === 'function') {
          mostrarResultados(candidatos, votantes, votos);
        }
      }

      function actualizarGraficoBarras() {
        const conteo = Array(candidatos.length).fill(0);
        votos.forEach(v => {
          if (conteo[v.candidato] !== undefined) conteo[v.candidato]++;
        });
        const ctx = document.getElementById('grafico-barras').getContext('2d');
        if (window.graficoBarras) {
          window.graficoBarras.destroy();
        }
        window.graficoBarras = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: candidatos.map(c => c.nombre),
            datasets: [{
              label: 'Votos',
              data: conteo,
              backgroundColor: [
                'rgba(255, 99, 132, 0.7)',
                'rgba(54, 162, 235, 0.7)',
                'rgba(255, 206, 86, 0.7)',
                'rgba(75, 192, 192, 0.7)',
                'rgba(153, 102, 255, 0.7)',
                'rgba(255, 159, 64, 0.7)'
              ],
              borderRadius: 4,
              maxBarThickness: 70
            }]
          },
          options: {
            responsive: false,
            plugins: {
              legend: { display: false }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  stepSize: 1,
                  precision: 0,
                  font: {
                    size: 10
                  },
                  color: '#444'
                },
                grid: {
                  color: 'rgba(0, 0, 0, 0.1)',
                  lineWidth: 1
                }
              },
              x: {
                ticks: {
                  font: {
                    size: 10
                  }
                },
                grid: {
                  display: false
                }
              }
            }
          }
        });
      }

      function actualizarTodo() {
        actualizarResultados();
        actualizarGraficoBarras();
      }

      actualizarTodo();
      setInterval(actualizarTodo, 5000);
    });
  </script>
</body>
</html>
