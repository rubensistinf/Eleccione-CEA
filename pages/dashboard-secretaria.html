<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Secretaria</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="main-header">
    <div class="header-content">
      <div class="header-left">
        <h1>Panel de Secretaría</h1>
      </div>
      <nav>
        <button onclick="cerrarSesion()" style="background:transparent; color:white; border:none; cursor:pointer; font-weight:bold;">Cerrar Sesión</button>
      </nav>
    </div>
  </header>
  <main style="padding: 20px; display: flex; gap: 20px; flex-wrap: wrap;">
    
    <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; flex: 1; min-width: 300px;">
      <h3>Inscribir Nuevo Votante</h3>
      <input type="text" id="vot-ci" placeholder="C.I." style="width:100%; padding:8px; margin-bottom:10px;"><br>
      <input type="text" id="vot-nombre" placeholder="Nombre Completo" style="width:100%; padding:8px; margin-bottom:10px;"><br>
      <button onclick="inscribirVotante()" style="padding:8px 15px; width: 100%;">Inscribir</button>
      <div id="msg-votante" style="margin-top:10px; font-weight: bold;"></div>
    </div>

    <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; flex: 1; min-width: 300px;">
      <h3>Registrar Candidato</h3>
      <input type="number" id="cand-eleccion" placeholder="ID de Elección" style="width:100%; padding:8px; margin-bottom:10px;"><br>
      <input type="text" id="cand-nombre" placeholder="Nombre del Candidato/Frente" style="width:100%; padding:8px; margin-bottom:10px;"><br>
      <input type="text" id="cand-cargo" placeholder="Cargo (ej: Presidente, Centro)" style="width:100%; padding:8px; margin-bottom:10px;"><br>
      <textarea id="cand-desc" placeholder="Descripción breve" style="width:100%; padding:8px; margin-bottom:10px;"></textarea><br>
      <button onclick="registrarCandidato()" style="padding:8px 15px; width: 100%;">Registrar</button>
      <div id="msg-cand" style="margin-top:10px; font-weight: bold;"></div>
    </div>

  </main>
  
  <script src="../js/api.js"></script>
  <script>
    if(localStorage.getItem('user_rol') !== 'secretaria' && localStorage.getItem('user_rol') !== 'admin') cerrarSesion();

    async function inscribirVotante() {
        const ci = document.getElementById('vot-ci').value;
        const nombre = document.getElementById('vot-nombre').value;
        const msg = document.getElementById('msg-votante');
        
        const res = await apiFetch('/secretaria/usuarios', {
            method: 'POST',
            body: JSON.stringify({ ci, nombre })
        });
        if(res) {
            if(res.ok){
                const data = await res.json();
                msg.style.color = "green";
                msg.innerText = `Votante Inscripto. Correo: ${data.correo}`;
            } else {
                const err = await res.json();
                msg.style.color = "red";
                msg.innerText = err.detail;
            }
        }
    }

    async function registrarCandidato() {
        const eleccion_id = parseInt(document.getElementById('cand-eleccion').value);
        const nombre = document.getElementById('cand-nombre').value;
        const cargo = document.getElementById('cand-cargo').value;
        const descripcion = document.getElementById('cand-desc').value;
        const msg = document.getElementById('msg-cand');
        
        const res = await apiFetch('/secretaria/candidatos', {
            method: 'POST',
            body: JSON.stringify({ eleccion_id, nombre, cargo, descripcion })
        });
        if(res && res.ok){
            const data = await res.json();
            msg.style.color = "green";
            msg.innerText = `Candidato Registrado con ID: ${data.id}`;
        }
    }
  </script>
</body>
</html>
